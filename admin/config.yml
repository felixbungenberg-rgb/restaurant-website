backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "General Settings"
        file: "src/_data/site.yml"
        fields:
          - { label: "Restaurant Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Logo", name: "logo", widget: "image", required: false }
          - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
          - { label: "Hero CTA (Primary button)", name: "hero_cta_primary", widget: "string" }
          - { label: "Hero CTA (Secondary button)", name: "hero_cta_secondary", widget: "string" }
          - { label: "About Snippet (homepage)", name: "about_snippet", widget: "text" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - label: "Opening Hours"
            name: "hours"
            widget: "list"
            fields:
              - { label: "Day(s)", name: "day", widget: "string" }
              - { label: "Time", name: "time", widget: "string" }
          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
              - { label: "TripAdvisor URL", name: "tripadvisor", widget: "string", required: false }
          - { label: "Google Maps Embed Code", name: "google_maps_embed", widget: "text", required: false, hint: "Paste the full <iframe> embed code from Google Maps" }
          - { label: "Reservation System Embed Code", name: "reservation_system_embed", widget: "text", required: false, hint: "Paste your OpenTable / Resy / Bookatable embed code here" }
          - { label: "Reservations Page Intro Text", name: "reservation_intro", widget: "text" }
          - { label: "About / History Hero Image", name: "about_hero_image", widget: "image", required: false }
          - { label: "About / History Text", name: "about_body", widget: "markdown" }

  - name: "menu"
    label: "Menu"
    files:
      - name: "menu"
        label: "Menu Sections & Items"
        file: "src/_data/menu.yml"
        fields:
          - label: "Sections"
            name: "sections"
            widget: "list"
            fields:
              - { label: "Section Name", name: "name", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Dish Name", name: "name", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Price (e.g. £12.50)", name: "price", widget: "string" }
                  - { label: "Photo", name: "image", widget: "image", required: false }
                  - label: "Dietary Tags"
                    name: "tags"
                    widget: "select"
                    multiple: true
                    required: false
                    options: ["vegetarian", "vegan", "gluten-free", "featured"]

  - name: "shop"
    label: "Shop"
    files:
      - name: "shop"
        label: "Shop Products"
        file: "src/_data/shop.yml"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            fields:
              - { label: "Product Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Price (e.g. £9.00)", name: "price", widget: "string" }
              - { label: "Photo", name: "image", widget: "image", required: false }
              - { label: "Stripe Payment Link URL", name: "stripe_link", widget: "string", hint: "Paste the Stripe Payment Link URL (e.g. https://buy.stripe.com/...)" }
              - { label: "Show on Homepage", name: "featured", widget: "boolean", default: false }

  - name: "reviews"
    label: "Reviews"
    files:
      - name: "reviews"
        label: "Guest Reviews"
        file: "src/_data/reviews.yml"
        fields:
          - label: "Reviews"
            name: "reviews"
            widget: "list"
            fields:
              - { label: "Guest Name", name: "author", widget: "string" }
              - { label: "Rating (1–5)", name: "rating", widget: "number", min: 1, max: 5, value_type: "int" }
              - { label: "Review Text", name: "text", widget: "text" }
              - { label: "Date (e.g. March 2026)", name: "date", widget: "string" }
              - { label: "Source (e.g. Google, TripAdvisor)", name: "source", widget: "string" }
              - { label: "Show on Homepage", name: "featured", widget: "boolean", default: false }
