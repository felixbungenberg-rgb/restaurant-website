about_body: |
  La Bella Cucina was founded in 1987 by the Romani family, who emigrated from Naples with a suitcase full of recipes and a dream of sharing Italian hospitality with London.

  Today, the third generation of the family continues the tradition. Our pasta is made fresh each morning, our sauces are slow-cooked for hours, and our bread is baked on-site daily.

  We believe a great meal is more than food — it's warmth, conversation, and the feeling of being at home.
