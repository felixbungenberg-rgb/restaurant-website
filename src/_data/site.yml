about_body: |
  Sven Rurup, gebürtiger Sylter und leidenschaftlicher Surfer, hat sich mit der Strandmuschel seinen Traum erfüllt: ein Ort auf der Düne, wo man barfuß ankommt und trotzdem großartig isst.

  Regionale Zutaten treffen auf mediterrane Einflüsse — frischer Fisch aus der Nordsee, hausgemachte Tapas, handverlesene Weine. Kein Dresscode, kein Schnickschnack.

  Kinder, Hunde und Surfboards sind herzlich willkommen. Die Strandmuschel ist zu Fuß oder per Fahrrad erreichbar — der Parkplatz am Strandweg liegt rund 500 Meter entfernt.
